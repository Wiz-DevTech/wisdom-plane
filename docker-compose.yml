version: "3.9"

x-app-env: &app-env
  SECRET_KEY: ${PLANE_SECRET_KEY}
  DATABASE_URL: postgresql://${PLANE_DB_USER:-plane}:${PLANE_DB_PASSWORD}@plane-db:5432/${PLANE_DB_NAME:-plane}
  REDIS_URL: redis://plane-redis:6379/

  WEB_URL: https://plane.wisdomignited.com
  APP_BASE_URL: https://plane.wisdomignited.com
  API_BASE_URL: https://plane.wisdomignited.com/api
  SPACE_BASE_URL: https://plane.wisdomignited.com

  DEBUG: "0"
  DJANGO_SETTINGS_MODULE: plane.settings.production

  # RabbitMQ (FIXED - consistent credentials)
  CELERY_BROKER_URL: amqp://guest:guest@plane-rabbitmq:5672//
  AMQP_URL: amqp://guest:guest@plane-rabbitmq:5672//

  # Email (STANDARD DJANGO FORMAT - FIXED)
  EMAIL_HOST: smtp.zoho.com
  EMAIL_PORT: "587"
  EMAIL_HOST_USER: plane@masseyrosupo.com
  EMAIL_HOST_PASSWORD: "e5ycWM0T70RW"
  EMAIL_USE_TLS: "1"
  DEFAULT_FROM_EMAIL: "Plane <plane@masseyrosupo.com>"

  ENABLE_EMAIL_PASSWORD_AUTH: "1"
  ENABLE_MAGIC_LINK_LOGIN: "1"

  # Security (CRITICAL FIX)
  CORS_ALLOWED_ORIGINS: https://plane.wisdomignited.com
  CSRF_TRUSTED_ORIGINS: https://plane.wisdomignited.com
  SESSION_COOKIE_SECURE: "true"
  CSRF_COOKIE_SECURE: "true"
  USE_X_FORWARDED_HOST: "true"
  SECURE_PROXY_SSL_HEADER: "HTTP_X_FORWARDED_PROTO,https"

services:

  plane-db:
    image: postgres:15-alpine
    container_name: plane-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PLANE_DB_USER:-plane}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME:-plane}
    volumes:
      - plane-db-data:/var/lib/postgresql/data
    networks:
      - plane-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "plane"]
      interval: 30s
      timeout: 10s
      retries: 3

  plane-redis:
    image: redis:7-alpine
    container_name: plane-redis
    restart: unless-stopped
    networks:
      - plane-net

  plane-rabbitmq:
    image: rabbitmq:3-management
    container_name: plane-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - plane-net

  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    restart: unless-stopped
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_started

  command: gunicorn plane.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    environment:
      <<: *app-env
      ENABLE_SIGNUP: "1"
      ENABLE_EMAIL_PASSWORD: "1"

    volumes:
      - plane-media:/app/media

    ports:
      - "8000:8000"

    networks:
      - plane-net

  plane-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-worker
    restart: unless-stopped
    command: celery -A plane worker -l info
    depends_on:
      - plane-api
      - plane-rabbitmq
    environment:
      <<: *app-env
    networks:
      - plane-net

  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://plane.wisdomignited.com
    depends_on:
      - plane-api
    ports:
      - "8080:3000"
    networks:
      - plane-net

volumes:
  plane-db-data:
  plane-media:

networks:
  plane-net:
    driver: bridge
