version: '3.9'

x-app-env: &app-env
  SECRET_KEY: ${PLANE_SECRET_KEY}
  DATABASE_URL: postgresql://${PLANE_DB_USER:-plane}:${PLANE_DB_PASSWORD}@plane-db:5432/${PLANE_DB_NAME:-plane}
  REDIS_URL: redis://plane-redis:6379/
  WEB_URL: https://plane.wisdomignited.com
  CORS_ALLOWED_ORIGINS: https://plane.wisdomignited.com
  DEBUG: "0"

services:
  plane-db:
    image: postgres:15-alpine
    container_name: plane-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PLANE_DB_USER:-plane}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME:-plane}
    volumes:
      - plane-db-data:/var/lib/postgresql/data
    networks:
      - plane-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "plane"]
      interval: 30s
      timeout: 10s
      retries: 3

  plane-redis:
    image: redis:7-alpine
    container_name: plane-redis
    restart: unless-stopped
    networks:
      - plane-net

  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    restart: unless-stopped
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_started
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      <<: *app-env
    volumes:
      - plane-media:/app/media
    networks:
      - plane-net
      - ops-net
    ports:
      - "8000:8000"

  plane-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-worker
    restart: unless-stopped
    command: celery -A plane worker -l info
    depends_on:
      - plane-api
    environment:
      <<: *app-env
    networks:
      - plane-net

  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://plane.wisdomignited.com
    depends_on:
      - plane-api
    networks:
      - plane-net
      - ops-net
    ports:
      - "3001:3000"

volumes:
  plane-db-data:
  plane-media:

networks:
  plane-net:
    driver: bridge
  ops-net:
    external: true
    name: wisdom-ops-net
