events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  add_header X-Frame-Options    "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript;

  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  server {
    listen 443 ssl http2;
    server_name plane.wisdomignited.com;
  
    ssl_certificate /etc/nginx/ssl/plane.wisdomignited.com.crt;
    ssl_certificate_key /etc/nginx/ssl/plane.wisdomignited.com.key;
  
    # Rest of your config...
  }
  server {
    listen 80;
    server_name plane.wisdomignited.com;
    client_max_body_size 50M;
    return 301 https://$server_name$request_uri;  # Redirect HTTP to HTTPS

    location /api/ {
      proxy_pass       http://plane-api:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass         http://plane-web:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
